openapi: 3.1.0
info:
  title: Financiar API
  version: 4.0.0
  description: |
    Financiar (formerly Spendly) is a full-stack fintech platform for business
    finance management. It supports dual payment processors (Stripe + Paystack),
    virtual cards, multi-currency wallets, payroll, invoicing, and more.

    ## Authentication
    Most endpoints require a Bearer JWT token issued by Firebase Auth, sent via
    the `Authorization` header.

    ## Common Headers
    | Header | Purpose |
    |--------|---------|
    | `Authorization` | `Bearer <jwt>` |
    | `X-Company-Id` | Active company context |
    | `x-transaction-pin` | 4-digit PIN for sensitive operations |

    ## Response Shape
    All responses follow a consistent envelope:
    ```json
    { "success": true, "data": <T> }
    { "success": false, "error": "message" }
    ```

    ## Monetary Values
    All monetary amounts are integers in the smallest currency unit (cents, kobo, etc.).
  contact:
    name: Financiar Support
    email: lami.george@onesourceitsolutions.co.uk
  license:
    name: Proprietary

servers:
  - url: http://localhost:5000
    description: Local development
  - url: https://api.financiar.app
    description: Production

tags:
  - name: Health
    description: Service health checks
  - name: Expenses
    description: Expense tracking and approval workflows
  - name: Transactions
    description: Financial transaction records
  - name: Balances
    description: Company balance management
  - name: Bills
    description: Bill management and payment
  - name: Budgets
    description: Budget planning and tracking
  - name: Cards
    description: Virtual card issuing and management (Stripe Issuing)
  - name: Virtual Accounts
    description: Virtual bank accounts and funding sources
  - name: Payments
    description: Payment processing, regions, and exchange rates
  - name: Companies
    description: Company management and team invitations
  - name: Team
    description: Team members and departments
  - name: Invoices
    description: Invoice creation and public payment
  - name: Vendors
    description: Vendor management and payments
  - name: Payroll
    description: Payroll processing and batch payouts
  - name: Reports
    description: Financial reports and AI insights
  - name: Analytics
    description: Dashboards, KPIs, and analytics snapshots
  - name: KYC
    description: User profiles and KYC verification
  - name: Settings
    description: Application settings
  - name: Notifications
    description: Notifications and push tokens
  - name: Wallets
    description: Multi-currency wallets and exchange rates
  - name: Payouts
    description: Payout destinations and processing
  - name: Admin
    description: Administrative operations (requires admin role)
  - name: Webhooks
    description: Payment processor webhook handlers
  - name: Scheduled Payments
    description: Recurring and scheduled payment management

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Firebase Auth JWT token

  parameters:
    CompanyId:
      name: X-Company-Id
      in: header
      required: true
      schema:
        type: string
      description: Active company context
    TransactionPin:
      name: x-transaction-pin
      in: header
      required: true
      schema:
        type: string
        pattern: '^\d{4}$'
      description: 4-digit transaction PIN
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Resource ID
    PaginationLimit:
      name: limit
      in: query
      schema:
        type: integer
        default: 50
    PaginationOffset:
      name: offset
      in: query
      schema:
        type: integer
        default: 0

  schemas:
    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
        data: {}

    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          const: false
        error:
          type: string

    Expense:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        userId:
          type: integer
        description:
          type: string
        amount:
          type: integer
          description: Amount in cents/kobo
        currency:
          type: string
        category:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected, changes_requested, paid]
        receiptUrl:
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time

    Transaction:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        type:
          type: string
          enum: [credit, debit]
        amount:
          type: integer
        currency:
          type: string
        description:
          type: string
        category:
          type: string
        createdAt:
          type: string
          format: date-time

    Bill:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        vendorId:
          type: integer
        description:
          type: string
        amount:
          type: integer
        currency:
          type: string
        dueDate:
          type: string
          format: date
        status:
          type: string
          enum: [pending, approved, rejected, changes_requested, paid]
        createdAt:
          type: string
          format: date-time

    Budget:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        name:
          type: string
        amount:
          type: integer
        spent:
          type: integer
        period:
          type: string
        category:
          type: string
        createdAt:
          type: string
          format: date-time

    Card:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        userId:
          type: integer
        last4:
          type: string
        brand:
          type: string
        status:
          type: string
          enum: [active, frozen, cancelled]
        balance:
          type: integer
        spendingLimit:
          type: integer
        createdAt:
          type: string
          format: date-time

    VirtualAccount:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        accountName:
          type: string
        accountNumber:
          type: string
        bankName:
          type: string
        currency:
          type: string
        balance:
          type: integer
        createdAt:
          type: string
          format: date-time

    Company:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        industry:
          type: string
        country:
          type: string
        currency:
          type: string
        createdAt:
          type: string
          format: date-time

    TeamMember:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        userId:
          type: integer
        role:
          type: string
          enum: [owner, admin, member, viewer]
        departmentId:
          type: integer
        createdAt:
          type: string
          format: date-time

    Department:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        name:
          type: string
        createdAt:
          type: string
          format: date-time

    Invoice:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        clientName:
          type: string
        clientEmail:
          type: string
        amount:
          type: integer
        currency:
          type: string
        status:
          type: string
          enum: [draft, sent, paid, overdue, cancelled]
        dueDate:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time

    Vendor:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        name:
          type: string
        email:
          type: string
        category:
          type: string
        bankDetails:
          type: object
        createdAt:
          type: string
          format: date-time

    PayrollEntry:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        employeeId:
          type: integer
        grossPay:
          type: integer
        netPay:
          type: integer
        deductions:
          type: integer
        taxes:
          type: integer
        status:
          type: string
          enum: [pending, processed, paid, failed]
        payPeriod:
          type: string
        createdAt:
          type: string
          format: date-time

    Wallet:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        currency:
          type: string
        balance:
          type: integer
        createdAt:
          type: string
          format: date-time

    PayoutDestination:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        name:
          type: string
        bankName:
          type: string
        accountNumber:
          type: string
        currency:
          type: string
        createdAt:
          type: string
          format: date-time

    Payout:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        destinationId:
          type: integer
        amount:
          type: integer
        currency:
          type: string
        status:
          type: string
          enum: [pending, approved, processing, completed, rejected, failed]
        createdAt:
          type: string
          format: date-time

    Notification:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        title:
          type: string
        message:
          type: string
        type:
          type: string
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        cognitoSub:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        country:
          type: string
        kycStatus:
          type: string
          enum: [not_started, pending, approved, rejected]
        createdAt:
          type: string
          format: date-time

    ScheduledPayment:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        amount:
          type: integer
        currency:
          type: string
        frequency:
          type: string
          enum: [daily, weekly, biweekly, monthly, quarterly, yearly]
        status:
          type: string
          enum: [active, paused, completed, cancelled]
        nextRunAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    HealthCheck:
      type: object
      properties:
        status:
          type: string
        database:
          type: string
        timestamp:
          type: string
          format: date-time

paths:
  # ─── Health ──────────────────────────────────────────────
  /api/health:
    get:
      tags: [Health]
      summary: Health check with DB status
      security: []
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/HealthCheck'

  # ─── Expenses ────────────────────────────────────────────
  /api/expenses:
    get:
      tags: [Expenses]
      summary: List expenses
      operationId: listExpenses
      parameters:
        - $ref: '#/components/parameters/CompanyId'
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationOffset'
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, changes_requested, paid]
        - name: category
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of expenses
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Expense'
    post:
      tags: [Expenses]
      summary: Create expense
      operationId: createExpense
      parameters:
        - $ref: '#/components/parameters/CompanyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [description, amount, currency, category]
              properties:
                description:
                  type: string
                amount:
                  type: integer
                currency:
                  type: string
                category:
                  type: string
                receiptUrl:
                  type: string
      responses:
        '201':
          description: Expense created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/Expense'

  /api/expenses/{id}:
    get:
      tags: [Expenses]
      summary: Get expense by ID
      operationId: getExpense
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/CompanyId'
      responses:
        '200':
          description: Expense details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/Expense'
        '404':
          description: Expense not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [Expenses]
      summary: Update expense (PIN required for approval)
      operationId: updateExpense
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/CompanyId'
        - $ref: '#/components/parameters/TransactionPin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                amount:
                  type: integer
                category:
                  type: string
                status:
                  type: string
      responses:
        '200':
          description: Expense updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/Expense'
    delete:
      tags: [Expenses]
      summary: Delete expense
      operationId: deleteExpense
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/CompanyId'
      responses:
        '200':
          description: Expense deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/upload/receipt:
    post:
      tags: [Expenses]
      summary: Upload receipt image
      operationId: uploadReceipt
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                receipt:
                  type: string
                  format: binary
      responses:
        '200':
          description: Receipt uploaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        type: object
                        properties:
                          url:
                            type: string
                            format: uri

  /api/expenses/batch-approve:
    post:
      tags: [Expenses]
      summary: Batch approve expenses (admin, PIN required)
      operationId: batchApproveExpenses
      parameters:
        - $ref: '#/components/parameters/CompanyId'
        - $ref: '#/components/parameters/TransactionPin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [expenseIds]
              properties:
                expenseIds:
                  type: array
                  items:
                    type: integer
      responses:
        '200':
          description: Expenses approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/expenses/{id}/reject:
    post:
      tags: [Expenses]
      summary: Reject expense (admin)
      operationId: rejectExpense
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/CompanyId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Expense rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/expenses/{id}/request-changes:
    post:
      tags: [Expenses]
      summary: Request changes on expense (admin)
      operationId: requestExpenseChanges
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/CompanyId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comments:
                  type: string
      responses:
        '200':
          description: Changes requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/expenses/{id}/approve-and-pay:
    post:
      tags: [Expenses]
      summary: Approve and pay out expense (admin, PIN required)
      operationId: approveAndPayExpense
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/CompanyId'
        - $ref: '#/components/parameters/TransactionPin'
      responses:
        '200':
          description: Expense approved and paid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # ─── Transactions ────────────────────────────────────────
  /api/transactions:
    get:
      tags: [Transactions]
      summary: List transactions
      operationId: listTransactions
      parameters:
        - $ref: '#/components/parameters/CompanyId'
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationOffset'
        - name: type
          in: query
          schema:
            type: string
            enum: [credit, debit]
      responses:
        '200':
          description: List of transactions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Transaction'
    post:
      tags: [Transactions]
      summary: Create transaction
      operationId: createTransaction
      parameters:
        - $ref: '#/components/parameters/CompanyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, amount, currency, description]
              properties:
                type:
                  type: string
                  enum: [credit, debit]
                amount:
                  type: integer
                currency:
                  type: string
                description:
                  type: string
                category:
                  type: string
      responses:
        '201':
          description: Transaction created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/Transaction'

  /api/transactions/{id}:
    get:
      tags: [Transactions]
      summary: Get transaction by ID
      operationId: getTransaction
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/CompanyId'
      responses:
        '200':
          description: Transaction details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/Transaction'
    patch:
      tags: [Transactions]
      summary: Update transaction
      operationId: updateTransaction
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/CompanyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                category:
                  type: string
      responses:
        '200':
          description: Transaction updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/Transaction'
    delete:
      tags: [Transactions]
      summary: Delete transaction
      operationId: deleteTransaction
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/CompanyId'
      responses:
        '200':
          description: Transaction deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # ─── Balances ────────────────────────────────────────────
  /api/balances:
    get:
      tags: [Balances]
      summary: Get company balance
      operationId: getBalances
      parameters:
        - $ref: '#/components/parameters/CompanyId'
      responses:
        '200':
          description: Company balance
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        type: object
                        properties:
                          balance:
                            type: integer
                          currency:
                            type: string
    patch:
      tags: [Balances]
      summary: Update balances (admin)
      operationId: updateBalances
      parameters:
        - $ref: '#/components/parameters/CompanyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                balance:
                  type: integer
      responses:
        '200':
          description: Balances updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/balances/fund:
    post:
      tags: [Balances]
      summary: Fund company balance
      operationId: fundBalance
      parameters:
        - $ref: '#/components/parameters/CompanyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, currency]
              properties:
                amount:
                  type: integer
                currency:
                  type: string
                paymentMethodId:
                  type: string
      responses:
        '200':
          description: Balance funded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/balances/withdraw:
    post:
      tags: [Balances]
      summary: Withdraw from balance (PIN required)
      operationId: withdrawBalance
      parameters:
        - $ref: '#/components/parameters/CompanyId'
        - $ref: '#/components/parameters/TransactionPin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, currency]
              properties:
                amount:
                  type: integer
                currency:
                  type: string
                destinationId:
                  type: integer
      responses:
        '200':
          description: Withdrawal initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/balances/send:
    post:
      tags: [Balances]
      summary: Send money (PIN required)
      operationId: sendMoney
      parameters:
        - $ref: '#/components/parameters/CompanyId'
        - $ref: '#/components/parameters/TransactionPin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, currency, recipientId]
              properties:
                amount:
                  type: integer
                currency:
                  type: string
                recipientId:
                  type: integer
                description:
                  type: string
      responses:
        '200':
          description: Money sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # ─── Bills ──────────────────────────────────────────────
  /api/bills:
    get:
      tags: [Bills]
      summary: List bills
      operationId: listBills
      parameters:
        - $ref: '#/components/parameters/CompanyId'
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationOffset'
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, changes_requested, paid]
      responses:
        '200':
          description: List of bills
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Bill'
    post:
      tags: [Bills]
      summary: Create bill
      operationId: createBill
      parameters:
        - $ref: '#/components/parameters/CompanyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [description, amount, currency, dueDate]
              properties:
                vendorId:
                  type: integer
                description:
                  type: string
                amount:
                  type: integer
                currency:
                  type: string
                dueDate:
                  type: string
                  format: date
      responses:
        '201':
          description: Bill created
          content:
            application/json:
