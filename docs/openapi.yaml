  # ─── Scheduled Payments ─────────────────────────────────
  /api/scheduled-payments:
    get:
      tags: [Scheduled Payments]
      summary: List scheduled payments
      operationId: listScheduledPayments
      parameters:
        - $ref: '#/components/parameters/CompanyId'
      responses:
        '200':
          description: Scheduled payments
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ScheduledPayment'
    post:
      tags: [Scheduled Payments]
      summary: Create scheduled payment
      operationId: createScheduledPayment
      parameters:
        - $ref: '#/components/parameters/CompanyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, currency, frequency, destinationId]
              properties:
                amount:
                  type: integer
                currency:
                  type: string
                frequency:
                  type: string
                  enum: [daily, weekly, biweekly, monthly, quarterly, yearly]
                destinationId:
                  type: integer
                startDate:
                  type: string
                  format: date
                description:
                  type: string
      responses:
        '201':
          description: Scheduled payment created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/ScheduledPayment'

  /api/scheduled-payments/{id}:
    patch:
      tags: [Scheduled Payments]
      summary: Update scheduled payment
      operationId: updateScheduledPayment
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/CompanyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: integer
                frequency:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Scheduled payment updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/ScheduledPayment'
    delete:
      tags: [Scheduled Payments]
      summary: Delete scheduled payment
      operationId: deleteScheduledPayment
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/CompanyId'
      responses:
        '200':
          description: Scheduled payment deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/scheduled-payments/{id}/pause:
    post:
      tags: [Scheduled Payments]
      summary: Pause scheduled payment
      operationId: pauseScheduledPayment
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/CompanyId'
      responses:
        '200':
          description: Payment paused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/scheduled-payments/{id}/resume:
    post:
      tags: [Scheduled Payments]
      summary: Resume scheduled payment
      operationId: resumeScheduledPayment
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/CompanyId'
      responses:
        '200':
          description: Payment resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
